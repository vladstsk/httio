name: Releasing

on:
  pull_request_target:
    types:
      - closed

jobs:
  release:
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Find changed packages
        id: changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request.number;
            const files = (await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
            })).data;
            
            const pkgs = new Set();
            
            for (const f of files) {
              if (f.filename.startsWith('packages/') &&
                  !f.filename.endsWith('package.json') &&
                  !f.filename.endsWith('package-lock.json')) {
                pkgs.add(f.filename.split('/')[1]);
              }
            }
            
            core.setOutput('packages', [...pkgs].join(' '));

      - name: Bump versions in a new branch
        if: steps.changed.outputs.packages != ''
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          
          pr_title="${{ github.event.pull_request.title }}"
          
          if [[ "$pr_title" =~ BREAKING[[:space:]]CHANGE ]] || [[ "$pr_title" =~ .*!.* ]]; then
            bump="major"
          elif [[ "$pr_title" =~ ^feat ]]; then
            bump="minor"
          else
            bump="patch"
          fi

          BRANCH="releases/${{ github.event.pull_request.number }}"
          git checkout -b $BRANCH

          for pkg in ${{ steps.changed.outputs.packages }}; do
            echo "Processing package: $pkg"

            npm version $bump --prefix "packages/$pkg" --no-git-tag-version

            ver=$(jq -r .version packages/$pkg/package.json)
            name=$(jq -r .name packages/$pkg/package.json)
            git tag "${name}@${ver}"
          done

          npm install --package-lock-only
          git add $(printf "packages/%s/package.json " ${{ steps.changed.outputs.packages }}) package-lock.json
          git commit -m "chore(release): bump versions [skip ci]"

          git push origin $BRANCH
          git push origin --tags

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "releases/${{ github.event.pull_request.number }}"
          title: "Release: bump package versions"
          body: |
            This PR bumps versions for updated packages:
            ${{ steps.changed.outputs.packages }}
          commit-message: "chore(release): bump versions"
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
