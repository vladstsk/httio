name: Releasing

on:
  create:
    tags:
      - '*@*'

#permissions:
#  contents: write
#  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          node-version: ${{ matrix.node-version }}

      - name: Parse tag
        id: parse
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const [pkg, version] = tag.split('@');
            core.setOutput('package', pkg);
            core.setOutput('version', version);

      - name: GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const [owner, repo] = [context.repo.owner, context.repo.repo];
            let rel;
            try {
              rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch {
              rel = null;
            }
            const body = `Release for **${tag}**`;
            if (rel) {
              core.info(`Updating release #${rel.data.id}`);
              await github.rest.repos.updateRelease({
                owner, repo,
                release_id: rel.data.id,
                tag_name: tag,
                name: tag,
                body,
              });
            } else {
              core.info(`Creating release for ${tag}`);
              await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: tag,
                body,
                draft: false,
                prerelease: false,
              });
            }

