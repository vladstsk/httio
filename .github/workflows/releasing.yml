name: Releasing

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    if: github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Find changed packages
        id: changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request.number;
            const files = (await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
            })).data;
            
            const pkgs = new Set();
            
            for (const f of files) {
              if (f.filename.startsWith('packages/') &&
                  !f.filename.endsWith('package.json') &&
                  !f.filename.endsWith('package-lock.json')) {
                pkgs.add(f.filename.split('/')[1]);
              }
            }
            
            core.setOutput('packages', [...pkgs].join(' '));

      - name: Bump versions in a new branch
        if: steps.changed.outputs.packages != ''
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          
          pr_title="${{ github.event.pull_request.title }}"
          
          if [[ "$pr_title" =~ BREAKING[[:space:]]CHANGE ]] || [[ "$pr_title" =~ .*!.* ]]; then
            bump="major"
          elif [[ "$pr_title" =~ ^feat ]]; then
            bump="minor"
          else
            bump="patch"
          fi

          BRANCH="releases/pr-${{ github.event.pull_request.number }}"
          git checkout -b $BRANCH

          for pkg in ${{ steps.changed.outputs.packages }}; do
            echo "Processing package: $pkg"

            npm version $bump --prefix "packages/$pkg" --no-git-tag-version

            ver=$(jq -r .version packages/$pkg/package.json)
            name=$(jq -r .name packages/$pkg/package.json)
            git tag "${name}@${ver}"
          done

          npm install --package-lock-only
          git add $(printf "packages/%s/package.json " ${{ steps.changed.outputs.packages }}) package-lock.json
          git commit -m "chore(release): bump versions for ${{ steps.changed.outputs.packages }} [skip ci]"

          git push origin $BRANCH
          git push origin --tags

      - name: Create and auto-merge Release PR
        if: steps.changed.outputs.packages != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED: ${{ steps.changed.outputs.packages }}
          PR_NUM: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          RELEASE_BRANCH="release/pr-${PR_NUM}"
          echo "→ Preparing Release PR from ${RELEASE_BRANCH} into ${BASE_REF} for packages: ${CHANGED}"

          gh pr create \
            --title "chore(release): bump versions for ${CHANGED}" \
            --body "This PR bumps versions for the following packages:\n${CHANGED}" \
            --base "${BASE_REF}" \
            --head "${RELEASE_BRANCH}"

          NEW_PR_NUM=$(gh pr view --json number --jq .number --head "${RELEASE_BRANCH}")
          echo "→ Release PR #${NEW_PR_NUM} created"

          gh pr merge "${NEW_PR_NUM}" --squash --delete-branch --auto
