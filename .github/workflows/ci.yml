  upgrade:
    runs-on: ubuntu-latest

#    needs:
#      - test

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          cache: 'npm'
          node-version: ${{ matrix.node_version }}

      - name: Find changed packages
        id: changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const base = context.payload.pull_request.base.ref;
            const head = context.payload.pull_request.head.sha;

            const diff = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base,
              head
            });
            
            const pkgs = new Set();
            
            for (const f of diff.data.files) {
              if (!f.filename.startsWith('packages/') || /^packages\/[^\/]+\/package\.json$/.test(f.filename)) {
                continue;
              }
            
              pkgs.add(f.filename.split('/')[1]);
            }

            core.setOutput('packages', Array.from(pkgs).join(' '));

      - name: Bump versions per package
        if: steps.changed.outputs.packages != ''
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          BASE=${{ github.event.pull_request.base.ref }}
          
          git fetch origin $BASE --depth=1

          for pkg in ${{ steps.changed.outputs.packages }}; do
            echo "→ Processing package: $pkg"

            msgs=$(git log origin/$BASE..HEAD --pretty=format:%s -- packages/$pkg \
                   | grep -v "chore($pkg): bump")
          
            if [[ -z "$msgs" ]]; then
              echo "→ No new changes for $pkg, skipping"
              continue
            fi

            level=0
            while IFS= read -r m; do
              if [[ $m =~ BREAKING[[:space:]]CHANGE ]] || [[ $m =~ .*!.* ]]; then
                level=3; break
              elif [[ $m =~ ^feat ]]; then
                (( level < 2 )) && level=2
              elif [[ $m =~ ^fix|^perf ]]; then
                (( level < 1 )) && level=1
              fi
            done <<< "$msgs"

            case $level in
              3) bump=major ;;
              2) bump=minor ;;
              *) bump=patch ;;
            esac

            OLD=$(jq -r .version packages/$pkg/package.json)
            IFS=. read -r MAJOR MINOR PATCH <<< "$OLD"
            case $bump in
              major) NEW="$((MAJOR+1)).0.0" ;;
              minor) NEW="$MAJOR.$((MINOR+1)).0" ;;
              patch) NEW="$MAJOR.$MINOR.$((PATCH+1))" ;;
            esac

            if git rev-parse "${pkg}@${NEW}" >/dev/null 2>&1; then
              echo "→ Tag ${pkg}@${NEW} exists, skipping"
              continue
            fi

            npm version $bump --prefix "packages/$pkg" --no-git-tag-version
            npm install --package-lock-only
            
            git add "packages/$pkg/package.json" "package-lock.json"
            git commit -m "chore(${pkg}): bump ${OLD} -> ${NEW} [skip ci]"
            
            git tag "${pkg}@${NEW}"
          done

          git push origin HEAD:${{ github.head_ref }}
          git push origin --tags
        shell: bash
        env:
          CI: true
